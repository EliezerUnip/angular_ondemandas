<div class="usuarios-page">

  <div class="left-bar">
    <button class="side-arrow">❯</button>
  </div>

  <div class="main-content">

    <div class="top-header">
      <button class="home-button" (click)="irParaHome()">⌂</button>
    </div>

    <!-- ================= LISTA ================= -->
    <div class="content-area">

      <div class="users-list">

        <div class="user-card" *ngFor="let usuario of usuarios">

          <div class="card-left">
            <div class="avatar">👤</div>

            <div class="user-info">
              <h2>{{ usuario.nome }}</h2>
              <p>{{ usuario.email }}</p>
            </div>
          </div>

          <div class="card-right">

            <div class="top-info">
              <span class="perfil-icon">⚒</span>

              <span class="perfil-text">
                {{ usuario.atribuicao }}
              </span>

              <span class="status-text">
                {{ usuario.ativo ? 'Ativo' : 'Inativo' }}
              </span>
            </div>

            <div class="phone-info">
              <span class="phone-icon">📞</span>
              <span>{{ usuario.telefone }}</span>
            </div>

          </div>

        </div>

      </div>

      <div class="action-area">
        <button class="create-user-btn" (click)="abrirModalCriarUsuario()">
          <span class="btn-text">Criar Usuário</span>
          <span class="btn-plus">+</span>
        </button>
      </div>

    </div>
  </div>
</div>

<!-- ================= MODAL ================= -->

<div class="modal-overlay" *ngIf="modalAberto">

  <div class="modal-container">

    <div class="modal-header">
      <h2>Criar Usuário</h2>
      <button class="close-btn" (click)="fecharModalCriarUsuario()">✖</button>
    </div>

    <div class="modal-body">

      <form class="modal-right">

        <!-- NOME -->
        <div class="form-group">
          <label>Nome</label>
          <input
            type="text"
            name="nome"
            [(ngModel)]="novoUsuario.nome"
            required
          />
        </div>

        <!-- TELEFONE -->
        <div class="form-group">
          <label>Telefone</label>
          <input
            type="text"
            name="telefone"
            [(ngModel)]="novoUsuario.telefone"
          />
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="novoUsuario.email"
            required
          />
        </div>
